---
- name: Deploy Monies Backend
  hosts: backend
  become: true
  vars:
    deploy_dir: /opt/monies

  tasks:
    # ── System packages ──────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    # ── Docker ───────────────────────────────────────────────────
    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: true

    # ── Create deploy directory ──────────────────────────────────
    - name: Create deploy directory
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: "0755"

    # ── Copy files to server ─────────────────────────────────────
    - name: Copy docker-compose.yml
      copy:
        src: docker-compose.yml
        dest: "{{ deploy_dir }}/docker-compose.yml"

    - name: Copy Caddyfile
      copy:
        src: Caddyfile
        dest: "{{ deploy_dir }}/Caddyfile"

    - name: Copy config.yaml
      copy:
        src: ../config.yaml
        dest: "{{ deploy_dir }}/config.yaml"

    - name: Copy .env.prod
      copy:
        src: ../.env.prod
        dest: "{{ deploy_dir }}/.env.prod"
        mode: "0600"

    # ── Load Docker image ────────────────────────────────────────
    - name: Copy backend image tarball
      copy:
        src: ../monies-backend.tar
        dest: "{{ deploy_dir }}/monies-backend.tar"

    - name: Load backend image
      shell: docker load -i {{ deploy_dir }}/monies-backend.tar

    - name: Clean up tarball
      file:
        path: "{{ deploy_dir }}/monies-backend.tar"
        state: absent

    # ── Deploy with Docker Compose ───────────────────────────────
    - name: Start containers
      shell: docker compose up -d --remove-orphans
      args:
        chdir: "{{ deploy_dir }}"
      register: compose_result

    - name: Show compose output
      debug:
        var: compose_result.stdout_lines

    # ── Health check ─────────────────────────────────────────────
    - name: Wait for backend to respond
      uri:
        url: http://localhost:8000/health
        method: GET
        status_code: 200
      retries: 10
      delay: 5
      register: health

    - name: Backend health
      debug:
        var: health.json

    # ── Verify Caddy ─────────────────────────────────────────────
    - name: Check Caddy logs for TLS
      shell: docker compose logs caddy --tail 20
      args:
        chdir: "{{ deploy_dir }}"
      register: caddy_logs

    - name: Caddy status
      debug:
        var: caddy_logs.stdout_lines

    - name: Deployment complete
      debug:
        msg: >
          Backend deployed at https://signal-backend.dataprism.in
          Health: https://signal-backend.dataprism.in/health
