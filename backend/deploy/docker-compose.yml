services:
  backend:
    image: monies-backend:latest
    container_name: monies-backend
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: monies-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
